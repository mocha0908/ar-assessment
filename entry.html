<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>買取申込フォーム</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://yubinbango.github.io/yubinbango/yubinbango.js" charset="UTF-8"></script>
  <style>
    :root { --main: #0d124a; --bg: #f4f7f9; }
    body { background: var(--bg); color: #333; padding-bottom: 50px; }
    .container { max-width: 500px; margin-top: 30px; }
    .section-title { font-size: 0.85rem; font-weight: bold; color: var(--main); border-left: 4px solid var(--main); padding-left: 10px; margin: 25px 0 10px; }
    .form-label { font-weight: bold; font-size: 0.75rem; color: #555; }
    .btn-submit { background: var(--main); color: white; width: 100%; padding: 15px; margin-top: 20px; font-weight: bold; }
    .terms-box { background: #fff; border: 1px solid #ddd; padding: 15px; font-size: 0.7rem; height: 180px; overflow-y: scroll; white-space: pre-wrap; }
    .cancel-check-area { background: #fff3cd; padding: 12px; border-radius: 4px; margin-top: 15px; }
  </style>
</head>
<body>
<div class="container">
  <h5 class="fw-bold text-center mb-4">買取査定お申込フォーム</h5>
  <div id="statusMsg" class="status-msg" style="display:none; padding:10px; margin-bottom:10px; border-radius:4px;"></div>
  <div class="card p-4 shadow-sm">
    <form id="entryForm" class="h-adr">
      <span class="p-country-name" style="display:none;">Japan</span>
      <div class="section-title">本人確認</div>
      <div class="row g-2">
        <div class="col-6"><label class="form-label">氏名</label><input type="text" id="name" class="form-control" required></div>
        <div class="col-6"><label class="form-label">電話番号</label><input type="tel" id="tel" class="form-control" required></div>
      </div>
      <button type="button" class="btn btn-outline-dark btn-sm w-100 mt-2" onclick="checkRepeater()">リピーター照合</button>
      <div class="section-title mt-4">詳細情報</div>
      <div class="row g-2">
        <div class="col-6"><label class="form-label">カナ</label><input type="text" id="kana" class="form-control need-req" required></div>
        <div class="col-6"><label class="form-label">生年月日</label><input type="text" id="birthday" class="form-control need-req" placeholder="1990/01/01" required></div>
      </div>
      <div class="row g-2 mt-2">
        <div class="col-4"><label class="form-label">郵便番号</label><input type="text" id="zip" class="form-control p-postal-code"></div>
        <div class="col-8"><label class="form-label">現住所</label><input type="text" id="addressText" class="form-control need-req p-region p-locality p-street-address p-extended-address" required></div>
      </div>
      <div class="row g-2 mt-2">
        <div class="col-5"><label class="form-label">身分証種類</label><select id="idType" class="form-select need-req" required><option value="">選択</option><option value="運転免許証">運転免許証</option><option value="健康保険証">健康保険証</option><option value="マイナンバーカード">マイナンバーカード</option><option value="学生証">学生証</option></select></div>
        <div class="col-7"><label class="form-label">身分証番号</label><input type="text" id="idNum" class="form-control need-req" required></div>
      </div>
      <div class="mt-3 border-bottom pb-1 fw-bold small text-secondary">振込先</div>
      <div class="row g-2 mt-1">
        <div class="col-6"><input type="text" id="bankName" class="form-control form-control-sm need-req" placeholder="銀行名" required></div>
        <div class="col-6"><input type="text" id="bankBranch" class="form-control form-control-sm need-req" placeholder="支店名" required></div>
        <div class="col-4"><select id="bankType" class="form-select form-select-sm"><option value="普通">普通</option></select></div>
        <div class="col-8"><input type="text" id="bankNum" class="form-control form-control-sm need-req" placeholder="口座番号" required></div>
        <div class="col-12"><input type="text" id="bankHolder" class="form-control form-control-sm need-req" placeholder="名義(カナ)" required></div>
      </div>
      <div class="cancel-check-area">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="cancelIfSubMax">
          <label class="form-check-label small fw-bold" for="cancelIfSubMax">満額査定以外はキャンセルする</label>
        </div>
      </div>
      <div class="section-title mt-4">利用規約</div>
      <div class="terms-box">規約全文（略）</div>
      <div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="agree" required><label class="form-check-label small" for="agree">同意する</label></div>
      <button type="submit" id="submitBtn" class="btn btn-submit">査定を申し込む</button>
    </form>
  </div>
</div>
<script>
  const GAS_URL = "YOUR_GAS_URL";
  async function checkRepeater() {
    const name = document.getElementById('name').value;
    const tel = document.getElementById('tel').value;
    const res = await fetch(`${GAS_URL}?action=check_only&searchTel=${tel}&searchName=${encodeURIComponent(name)}`);
    const json = await res.json();
    if(json.found) alert("確認済み");
  }
  document.getElementById('entryForm').onsubmit = async (e) => {
    e.preventDefault();
    const data = {
      action: "customer_register",
      customerDetail: {
        name: document.getElementById('name').value, tel: document.getElementById('tel').value,
        kana: document.getElementById('kana').value, birthday: document.getElementById('birthday').value,
        addressText: document.getElementById('addressText').value, idType: document.getElementById('idType').value, idNum: document.getElementById('idNum').value,
        bankName: document.getElementById('bankName').value, bankBranch: document.getElementById('bankBranch').value, bankType: document.getElementById('bankType').value, bankNum: document.getElementById('bankNum').value, bankHolder: document.getElementById('bankHolder').value,
        cancelIfSubMax: document.getElementById('cancelIfSubMax').checked ? "希望する" : "希望しない"
      }
    };
    await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
    alert("完了");
  };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RAIRAI POS SYSTEM</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    :root { --main: #0d124a; --bg: #f8fafc; }
    body { background: var(--bg); color: #1e293b; padding-bottom: 150px; font-family: sans-serif; }
    .sticky-top { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 15px !important; z-index: 1020; }
    .case-badge { border: 1px solid #cbd5e1; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; background: white; cursor: pointer; }
    .case-badge.active { background: var(--main); color: white; }
    .waiting-badge { background: #facc15; color: #854d0e; border: 1px solid #eab308; }
    .filter-btn { padding: 4px 8px; font-size: 0.75rem; margin: 1px; }
    .main-table-container { background: white; margin: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
    .main-table { width: 100%; border-collapse: collapse; }
    .main-table th { background: #f1f5f9; padding: 8px; font-size: 0.7rem; text-align: center; }
    .main-table td { padding: 8px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    .qty-ctrl { display: flex; align-items: center; background: #f1f5f9; border-radius: 4px; margin: auto; border: 1px solid #ddd; }
    .qty-ctrl.has-value { background: var(--main); color: white; border-color: var(--main); }
    .qty-btn { border: none; background: transparent; color: inherit; width: 25px; height: 30px; font-weight: bold; }
    .qty-num { width: 30px; border: none; text-align: center; background: #fff; font-weight: bold; font-size: 0.8rem; height: 26px; }
    .footer-bar { position: fixed; bottom: 0; width: 100%; background: var(--main); color: white; padding: 10px 30px; display: flex; justify-content: space-between; align-items: center; z-index: 1050; }
  </style>
</head>
<body>

<div id="main-ui">
  <div class="sticky-top shadow-sm">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div class="h6 fw-bold m-0">RAIRAI POS SYSTEM</div>
      <div id="filter-btns" class="d-flex gap-1 flex-wrap"></div>
    </div>
    
    <div class="d-flex align-items-center gap-2 mb-2 overflow-auto pb-1">
      <button class="btn btn-primary btn-sm fw-bold" onclick="createNewCase()">新規</button>
      <div id="waiting-area" class="d-flex gap-1"></div>
      <div id="case-list-area" class="d-flex gap-1 border-start ps-2"></div>
    </div>

    <div class="d-flex gap-2 mb-2">
      <input type="text" id="cust-name" class="form-control form-control-sm" style="max-width:150px" placeholder="名前" oninput="autoUpdateCaseName()">
      <input type="text" id="search" class="form-control form-control-sm" placeholder="カード検索..." oninput="draw()">
      <button class="btn btn-dark btn-sm px-3" onclick="showReceipt()">明細書</button>
    </div>
  </div>
  <div id="display-container">
    <div class="p-5 text-center"><div class="spinner-border text-primary mb-2"></div><br>データを読み込んでいます...</div>
  </div>
</div>

<div id="receipt" class="container" style="display:none; padding:30px; background:white;">
  <div id="receipt-meta" class="mb-3 p-3 bg-light border fw-bold"></div>
  <table class="table table-sm"><thead><tr><th>商品</th><th>ランク</th><th>単価</th><th>数</th><th>計</th></tr></thead><tbody id="r-body"></tbody></table>
  <button class="btn btn-success w-100 mb-2" onclick="window.print()">印刷出力</button>
  <button class="btn btn-secondary w-100" onclick="hideReceipt()">編集に戻る</button>
</div>

<div class="footer-bar no-print">
  <div class="h4 m-0 fw-bold">¥<span id="t-amt">0</span> <small class="fs-6 opacity-75 ms-2"><span id="t-qty">0</span>枚</small></div>
  <button class="btn btn-outline-warning btn-sm" onclick="resetAll()">リセット</button>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwi7tWn74PWL-HD59oj7p1DZDdfddMn4wdJRJCCZJKznuBSLZ6GA88W6Lp-g1RrFkkSOw/exec";
  let cards = [], inputs = {}, activeCaseId = "default", cases = {}, currentFilter = "";
  const filterMap = { "あ": "^[あいうえおアイウエオ]", "か": "^[かきくけこがぎぐげごカキクケコガギグゲゴ]", "さ": "^[さしすせそざじずぜぞサシスセソザジズゼゾ]", "た": "^[たちつてとだぢづでどタチツテトダヂヂヅデド]", "な": "^[なにぬねのナニヌネノ]", "は": "^[はひふへほハヒフヘホ]", "ま": "^[まみむめもマミムメモ]", "や": "^[やゆよヤユヨ]", "ら": "^[らりるれろラリルレロ]", "わ": "^[わをんワヲン]" };

  window.onload = async () => {
    // フィルターボタン
    const fb = document.getElementById('filter-btns');
    ["ALL", ...Object.keys(filterMap)].forEach(l => {
      const b = document.createElement('button');
      b.className = "btn btn-outline-secondary filter-btn"; b.innerText = l;
      b.onclick = () => { currentFilter = (l === "ALL") ? "" : filterMap[l]; draw(); };
      fb.appendChild(b);
    });

    const saved = localStorage.getItem('arpos_vfinal');
    if (saved) { cases = JSON.parse(saved); activeCaseId = localStorage.getItem('arpos_active_id') || Object.keys(cases)[0]; }
    else { cases = { "default": { name: "新規", tel: "", data: {} } }; }

    try {
      const res = await fetch(GAS_URL);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      cards = data;
      draw();
      loadCase(activeCaseId);
    } catch(e) {
      document.getElementById('display-container').innerHTML = `<div class="p-5 text-center text-danger fw-bold">取得失敗: ${e.message}<br>GASの「新しいデプロイ」を試してください。</div>`;
    }
    
    setInterval(refreshWaiting, 15000); refreshWaiting();
  };

  function draw() {
    const container = document.getElementById('display-container');
    const sw = document.getElementById('search').value.toLowerCase();
    const filtered = cards.filter(c => c.isFixed || (c.name.toLowerCase().includes(sw) && (currentFilter === "" || new RegExp(currentFilter).test(c.name))));
    
    let html = `<div class="main-table-container"><table class="main-table"><thead><tr><th style="width:35%">商品名</th><th>S</th><th>A</th><th>B</th><th>C</th><th>D</th></tr></thead><tbody>`;
    html += filtered.map(c => {
      const hasVal = ['S','A','B','C','D'].some(t => (inputs[c.name+'-'+t]?.q || 0) > 0);
      const cells = ['S','A','B','C','D'].map(t => {
        const key = c.name + '-' + t;
        const q = inputs[key]?.q || 0; const p = c['price'+t] || 0;
        return `<td><div class="qty-ctrl ${q>0?'has-value':''}"><button class="qty-btn" onclick="changeQty('${c.name}','${t}',${p},-1)">-</button><input type="number" class="qty-num" value="${q}" readonly><button class="qty-btn" onclick="changeQty('${c.name}','${t}',${p},1)">+</button></div><div class="text-center text-danger small mt-1" style="font-size:0.6rem">¥${p.toLocaleString()}</div></td>`;
      }).join('');
      return `<tr class="${hasVal?'bg-warning bg-opacity-10':''}"><td><div class="d-flex align-items-center gap-2"><img src="${c.image}" style="width:30px;height:42px;object-fit:contain" onerror="this.style.visibility='hidden'"><span class="small fw-bold">${c.name}</span></div></td>${cells}</tr>`;
    }).join('');
    container.innerHTML = html + `</tbody></table></div>`;
  }

  function changeQty(name, type, price, delta) {
    const key = name + '-' + type;
    let q = (inputs[key]?.q || 0) + delta;
    if (q <= 0) delete inputs[key]; else inputs[key] = { n: name, t: type, p: price, q: q };
    saveCurrentCase(); calc(); draw();
  }

  function calc() {
    let tq = 0, ta = 0; Object.values(inputs).forEach(i => { tq += i.q; ta += (i.q * i.p); });
    document.getElementById('t-qty').innerText = tq; document.getElementById('t-amt').innerText = ta.toLocaleString();
  }

  function saveCurrentCase() {
    cases[activeCaseId].name = document.getElementById('cust-name').value || "新規";
    cases[activeCaseId].data = inputs;
    localStorage.setItem('arpos_vfinal', JSON.stringify(cases));
    localStorage.setItem('arpos_active_id', activeCaseId);
  }

  function loadCase(id) {
    if(!cases[id]) return; activeCaseId = id; inputs = cases[id].data || {};
    document.getElementById('cust-name').value = cases[id].name === "新規" ? "" : cases[id].name;
    calc(); draw(); updateCaseListUI();
  }

  async function refreshWaiting() {
    try {
      const res = await fetch(GAS_URL + "?action=getWaiting");
      const list = await res.json();
      document.getElementById('waiting-area').innerHTML = list.map((c, i) => {
        const isCancel = c.cancelStatus === "希望する";
        return `<button class="case-badge waiting-badge" onclick="importWaiting('${c.name}','${c.tel}','${c.cancelStatus}')"><i class="bi bi-person"></i> ${c.name.substr(0,4)}${isCancel?'!':''}</button>`;
      }).join('');
    } catch(e){}
  }

  function importWaiting(name, tel, cancel) {
    if(!confirm(name + "様を読み込みますか？")) return;
    const id = "c_" + Date.now();
    cases[id] = { name: name, tel: tel, cancelIfSubMax: cancel, data: {} };
    saveCurrentCase(); loadCase(id);
  }

  function createNewCase() { const id = "c_"+Date.now(); cases[id] = {name:"新規",data:{}}; loadCase(id); }
  function autoUpdateCaseName() { saveCurrentCase(); updateCaseListUI(); }
  function updateCaseListUI() {
    const area = document.getElementById('case-list-area'); area.innerHTML = "";
    Object.keys(cases).forEach(id => {
      const b = document.createElement('button'); b.className = `case-badge ${id === activeCaseId ? 'active' : ''}`;
      b.innerText = cases[id].name; b.onclick = () => loadCase(id); area.appendChild(b);
    });
  }
  function showReceipt() { document.getElementById('main-ui').style.display='none'; document.getElementById('receipt').style.display='block'; const b = document.getElementById('r-body'); b.innerHTML = ""; Object.values(inputs).forEach(i => { b.innerHTML += `<tr><td>${i.n}</td><td>${i.t}</td><td>${i.p}</td><td>${i.q}</td><td>${i.p*i.q}</td></tr>`; }); }
  function hideReceipt() { document.getElementById('receipt').style.display='none'; document.getElementById('main-ui').style.display='block'; }
  function resetAll() { if(confirm('初期化しますか？')) { inputs={}; saveCurrentCase(); draw(); calc(); } }
</script>
</body>
</html>

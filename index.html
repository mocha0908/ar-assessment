<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RAIRAI POS SYSTEM</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    :root { --main: #0d124a; --bg: #f8fafc; --accent: #facc15; }
    body { background: var(--bg); color: #1e293b; padding-bottom: 150px; }
    .sticky-top { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 15px !important; }
    .case-badge { border: 1px solid #cbd5e1; padding: 8px 14px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; background: white; cursor: pointer; }
    .case-badge.active { background: var(--main); color: white; }
    .waiting-badge { background: var(--accent); color: #854d0e; border: 1px solid #eab308; }
    .cancel-warning { background: #fee2e2 !important; border-color: #ef4444 !important; color: #b91c1c !important; }
    .cancel-label { font-size: 0.7rem; background: #ef4444; color: white; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
    .main-table-container { background: white; margin: 20px; border-radius: 8px; border: 1px solid #e2e8f0; }
    .main-table { width: 100%; border-collapse: collapse; }
    .main-table th { background: #f1f5f9; padding: 12px; font-size: 0.75rem; }
    .main-table td { padding: 10px; border-bottom: 1px solid #f1f5f9; }
    .qty-ctrl { display: flex; align-items: center; background: #f1f5f9; border-radius: 4px; }
    .qty-ctrl.has-value { background: var(--main); color: white; }
    .qty-num { width: 35px; border: none; text-align: center; background: transparent; font-weight: bold; }
    .footer-bar { position: fixed; bottom: 0; width: 100%; background: var(--main); color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
    #receipt { display: none; background: #fff; padding: 30px; min-height: 100vh; }
    @media print { .no-print { display: none !important; } #receipt { display: block !important; } }
  </style>
</head>
<body>

<div id="main-ui" class="no-print">
  <div class="sticky-top shadow-sm">
    <div class="d-flex justify-content-between mb-3">
      <div class="h5 fw-bold m-0 text-uppercase" style="color:var(--main)">RAIRAI POS</div>
      <div class="btn-group">
        <button id="v-table" class="btn btn-sm btn-outline-dark active" onclick="switchView('table')">リスト</button>
        <button id="v-grid" class="btn btn-sm btn-outline-dark" onclick="switchView('grid')">タイル</button>
      </div>
    </div>
    <div class="d-flex align-items-center gap-2 mb-3 overflow-auto pb-2">
      <button class="btn btn-primary btn-sm px-3 fw-bold" onclick="createNewCase()">新規</button>
      <div id="waiting-area" class="d-flex gap-1"></div>
      <div id="case-list-area" class="d-flex gap-1 border-start ps-2"></div>
    </div>
    <div class="row g-2 mb-3">
      <div class="col-md-6 d-flex align-items-center">
        <input type="text" id="cust-name" class="form-control" placeholder="顧客名" oninput="autoUpdateCaseName()">
      </div>
      <div class="col-md-6"><input type="tel" id="cust-tel" class="form-control" placeholder="電話番号" oninput="saveCurrentCase()"></div>
    </div>
    <div class="d-flex gap-2">
      <input type="text" id="search" class="form-control w-50" placeholder="検索..." oninput="draw()">
      <button class="btn btn-dark fw-bold px-4" onclick="showReceipt()">明細確認</button>
    </div>
  </div>
  <div id="display-container"></div>
</div>

<div id="receipt" class="container">
  <div class="text-center mb-4"><h2 class="fw-bold">買取査定明細書</h2><div id="receipt-date" class="small"></div></div>
  <div id="receipt-meta" class="mb-3 p-3 bg-light rounded border fw-bold"></div>
  <table class="table border table-sm"><thead class="table-dark"><tr><th>商品名</th><th>ランク</th><th class="text-end">単価</th><th class="text-center">数量</th><th class="text-end">小計</th></tr></thead><tbody id="r-body"></tbody><tfoot class="fs-4 fw-bold"><tr><td colspan="4" class="text-end">合計額</td><td id="r-total-amt" class="text-end text-danger"></td></tr></tfoot></table>
  <div class="no-print mt-4 d-flex flex-column gap-2"><button class="btn btn-success py-3 fw-bold" onclick="window.print()">印刷 / PDF保存</button><button class="btn btn-primary py-3 fw-bold" id="confirm-btn" onclick="finalizeTrade()">確定保存</button><button class="btn btn-outline-secondary" onclick="hideReceipt()">編集に戻る</button></div>
</div>

<div class="footer-bar no-print">
  <div class="h2 m-0 fw-bold">¥<span id="t-amt">0</span> <small class="fs-6 opacity-75 ms-3"><span id="t-qty">0</span> 枚</small></div>
  <button class="btn btn-outline-warning fw-bold px-4 rounded-pill" onclick="resetAll()">リセット</button>
</div>

<script>
  const GAS_URL = "YOUR_GAS_URL";
  let cards = [], inputs = {}, activeCaseId = "default", cases = {}, currentView = "table", waitingList = [];

  window.onload = () => {
    const saved = localStorage.getItem('ar_pro_storage');
    if (saved) { cases = JSON.parse(saved); activeCaseId = localStorage.getItem('ar_pro_active_id') || Object.keys(cases)[0]; }
    else { cases = { "default": { name: "新規", tel: "", data: {} } }; }
    fetch(GAS_URL).then(res => res.json()).then(d => { cards = d; draw(); loadCase(activeCaseId); });
    setInterval(refreshWaiting, 10000); refreshWaiting();
  };

  async function refreshWaiting() {
    try {
      const res = await fetch(GAS_URL + "?action=getWaiting");
      waitingList = await res.json();
      document.getElementById('waiting-area').innerHTML = waitingList.map((c, i) => {
        const isCancel = c.cancelStatus === "希望する";
        return `<button class="case-badge waiting-badge ${isCancel ? 'cancel-warning' : ''}" onclick="importWaiting(${i})"><i class="bi bi-person-fill"></i> ${c.name.substr(0,4)} ${isCancel ? '!' : ''}</button>`;
      }).join('');
    } catch(e){}
  }

  async function importWaiting(idx) {
    const c = waitingList[idx]; if(!confirm(c.name + " 様を読み込みますか？")) return;
    const res = await fetch(`${GAS_URL}?action=search_full&searchTel=${c.tel}&searchName=${encodeURIComponent(c.name)}`);
    const json = await res.json();
    const id = "c_" + Date.now();
    const cancelStatus = c.cancelStatus || "希望しない";
    cases[id] = { name: c.name, tel: c.tel, cancelIfSubMax: cancelStatus, data: { ...(json.found ? json.data : {}), _customerDetail: { ...c, cancelIfSubMax: cancelStatus } } };
    localStorage.setItem('ar_pro_storage', JSON.stringify(cases)); loadCase(id);
  }

  function loadCase(id) {
    if(!cases[id]) id = Object.keys(cases)[0];
    activeCaseId = id; inputs = cases[id].data || {};
    const cInput = document.getElementById('cust-name');
    cInput.value = cases[id].name === "新規" ? "" : cases[id].name;
    document.getElementById('cust-tel').value = cases[id].tel || "";
    
    // キャンセル警告表示
    const isCancel = cases[id].cancelIfSubMax === "希望する";
    const labelId = "cancel-notify-label";
    let label = document.getElementById(labelId);
    if (isCancel) {
      if(!label) { label = document.createElement('span'); label.id = labelId; label.className = "cancel-label"; label.innerText = "減額時返送希望"; cInput.parentNode.appendChild(label); }
      cInput.classList.add('cancel-warning');
    } else { if(label) label.remove(); cInput.classList.remove('cancel-warning'); }

    calc(); draw(); updateCaseListUI();
  }

  function draw() {
    const container = document.getElementById('display-container');
    const sw = document.getElementById('search').value.toLowerCase();
    const filtered = cards.filter(c => c.isFixed || c.name.toLowerCase().includes(sw));
    
    let html = `<div class="main-table-container"><table class="main-table"><thead><tr><th>商品名</th><th>S</th><th>A</th><th>B</th><th>C</th><th>D</th></tr></thead><tbody>`;
    html += filtered.map(c => {
      const has = ['S','A','B','C','D'].some(t => inputs[c.name+'-'+t]?.q > 0);
      const cells = ['S','A','B','C','D'].map(t => {
        const q = inputs[c.name+'-'+t]?.q || 0; const p = c['price'+t] || 0;
        return `<td><div class="qty-ctrl ${q>0?'has-value':''}"><button class="btn btn-sm text-inherit" onclick="changeQty('${c.name}','${t}',${p},-1)">-</button><input type="number" class="qty-num" value="${q}"><button class="btn btn-sm text-inherit" onclick="changeQty('${c.name}','${t}',${p},1)">+</button></div></td>`;
      }).join('');
      return `<tr class="${has?'has-value':''}"><td><span class="small fw-bold">${c.name}</span></td>${cells}</tr>`;
    }).join('');
    container.innerHTML = html + `</tbody></table></div>`;
  }

  function changeQty(name, type, price, delta) {
    const key = name + '-' + type;
    let q = (inputs[key]?.q || 0) + delta;
    if (q <= 0) delete inputs[key]; else inputs[key] = { n: name, t: type, p: price, q: q };
    saveCurrentCase(); calc(); draw();
  }

  function calc() {
    let tq = 0, ta = 0; Object.values(inputs).forEach(i => { if(i.q){ tq += i.q; ta += (i.q * i.p); } });
    document.getElementById('t-qty').innerText = tq; document.getElementById('t-amt').innerText = ta.toLocaleString();
  }

  function showReceipt() {
    document.getElementById('main-ui').style.display='none'; document.getElementById('receipt').style.display='block';
    const b = document.getElementById('r-body'); b.innerHTML = "";
    Object.values(inputs).filter(i=>i.q>0).forEach(i => { b.innerHTML += `<tr><td>${i.n}</td><td>${i.t}</td><td class="text-end">¥${i.p.toLocaleString()}</td><td class="text-center">${i.q}</td><td class="text-end fw-bold">¥${(i.q*i.p).toLocaleString()}</td></tr>`; });
    document.getElementById('r-total-amt').innerText = "¥ " + document.getElementById('t-amt').innerText;
    const isCancel = cases[activeCaseId]?.cancelIfSubMax === "希望する";
    document.getElementById('receipt-meta').innerHTML = `顧客: ${document.getElementById('cust-name').value} / TEL: ${document.getElementById('cust-tel').value}${isCancel ? '<div class="text-danger">【減額時返送希望案件】</div>' : ''}`;
    document.getElementById('receipt-date').innerText = "発行: " + new Date().toLocaleString();
  }

  function saveCurrentCase() { if(!cases[activeCaseId]) return; cases[activeCaseId].name = document.getElementById('cust-name').value || "新規"; cases[activeCaseId].tel = document.getElementById('cust-tel').value; cases[activeCaseId].data = inputs; localStorage.setItem('ar_pro_storage', JSON.stringify(cases)); localStorage.setItem('ar_pro_active_id', activeCaseId); }
  function hideReceipt() { document.getElementById('receipt').style.display='none'; document.getElementById('main-ui').style.display='block'; }
  function createNewCase() { const id = "c_"+Date.now(); cases[id] = {name:"新規",tel:"",data:{}}; saveCurrentCase(); loadCase(id); }
  function autoUpdateCaseName() { saveCurrentCase(); updateCaseListUI(); }
  function updateCaseListUI() { const area = document.getElementById('case-list-area'); area.innerHTML = ""; Object.keys(cases).forEach(id => { const b = document.createElement('button'); b.className = `case-badge ${id === activeCaseId ? 'active' : ''}`; b.innerHTML = `${cases[id].name}`; b.onclick = () => loadCase(id); area.appendChild(b); }); }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR ASSESSMENT Pro - POS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    :root { --primary: #0d124a; --accent: #facc15; --bg: #f4f7f9; }
    body { background: var(--bg); color: #1e293b; font-family: 'Meiryo', sans-serif; padding-bottom: 140px; }
    .sticky-top { background: rgba(255, 255, 255, 0.95) !important; backdrop-filter: blur(10px); border-bottom: 3px solid var(--primary); z-index: 1020; }
    .case-badge { border: none; padding: 6px 12px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; margin: 2px; }
    .case-badge.active { background: var(--primary); color: white; }
    .main-table-container { background: #fff; border-radius: 15px; margin: 10px; border: 1px solid #ddd; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .main-table { width: 100%; border-collapse: collapse; }
    .main-table th { background: #f8fafc; font-size: 0.7rem; padding: 12px; border-bottom: 2px solid #eee; text-align: center; }
    .main-table td { padding: 8px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    .qty-ctrl { display: flex; align-items: center; background: #eee; border-radius: 6px; padding: 1px; width: fit-content; }
    .qty-ctrl.has-value { background: var(--primary); color: white; }
    .qty-btn { border: none; background: transparent; color: inherit; width: 26px; height: 26px; font-weight: bold; }
    .qty-num { width: 34px; border: none; background: #fff; text-align: center; font-weight: 900; height: 24px; border-radius: 4px; }
    .footer-bar { position: fixed; bottom: 0; width: 100%; background: var(--primary); color: #fff; padding: 15px 20px; z-index: 2000; border-radius: 20px 20px 0 0; }
    #receipt { display: none; background: white; padding: 30px; }
    #waiting-modal { position:fixed; top:10%; left:5%; width:90%; max-height:80%; overflow-y:auto; background:white; border:2px solid var(--primary); z-index:9999; padding:20px; border-radius:15px; box-shadow:0 0 50px rgba(0,0,0,0.5); }
    @media print { .no-print { display: none !important; } #receipt { display: block !important; } }
  </style>
</head>
<body>

<div class="container-fluid no-print" id="main-ui">
  <div class="sticky-top p-3 mb-2 shadow-sm">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div class="fw-bold fs-5"><i class="bi bi-cpu-fill"></i> AR買取 POS</div>
      <div>
        <button class="btn btn-warning btn-sm fw-bold shadow-sm" onclick="callWaitingList()"><i class="bi bi-person-lines-fill"></i> 受付一覧</button>
      </div>
    </div>
    <div class="p-2 bg-light rounded mb-2 d-flex align-items-center gap-2 overflow-auto">
      <button class="btn btn-primary btn-sm fw-bold" onclick="createNewCase()">新規+</button>
      <div id="case-list-area" class="d-flex"></div>
    </div>
    <div class="row g-1 mb-2">
      <div class="col-6"><input type="text" id="cust-name" class="form-control form-control-sm" placeholder="氏名" oninput="autoUpdateCaseName()"></div>
      <div class="col-6"><input type="tel" id="cust-tel" class="form-control form-control-sm" placeholder="電話" oninput="saveCurrentCase()"></div>
    </div>
    <div class="d-flex gap-1">
      <input type="text" id="search" class="form-control form-control-sm" placeholder="カード検索..." oninput="draw()">
      <button class="btn btn-dark btn-sm px-3 fw-bold" onclick="showReceipt()">明細確認</button>
    </div>
  </div>
  <div id="display-container"></div>
</div>

<div id="receipt" class="container">
  <div class="text-center mb-4"><h3 class="fw-bold">買取査定明細書</h3><div id="receipt-date"></div></div>
  <div id="receipt-meta" class="mb-4 p-2 bg-light rounded fw-bold"></div>
  <table class="table table-sm">
    <thead class="table-dark"><tr><th>カード</th><th>状態</th><th>単価</th><th>枚数</th><th>計</th></tr></thead>
    <tbody id="r-body"></tbody>
    <tfoot class="fs-5 fw-bold"><tr><td colspan="4" class="text-end">合計</td><td id="r-total-amt"></td></tr></tfoot>
  </table>
  <div class="no-print mt-4 d-flex flex-column gap-2">
    <button class="btn btn-success btn-lg py-3 fw-bold" onclick="window.print()">印刷 / PDF保存</button>
    <button class="btn btn-primary btn-lg py-3 fw-bold" id="confirm-btn" onclick="finalizeTrade()">買取確定（保存）</button>
    <button class="btn btn-secondary" onclick="hideReceipt()">戻る</button>
  </div>
</div>

<div class="footer-bar no-print d-flex justify-content-between align-items-center shadow-lg">
  <div><span style="font-size:1.8rem; font-weight:900; color:#facc15;">¥<span id="t-amt">0</span></span> <span class="badge bg-white text-dark"><span id="t-qty">0</span>枚</span></div>
  <button class="btn btn-outline-warning btn-sm" onclick="resetAll()">全消去</button>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwi7tWn74PWL-HD59oj7p1DZDdfddMn4wdJRJCCZJKznuBSLZ6GA88W6Lp-g1RrFkkSOw/exec";
  let cards = [], inputs = {}, activeCaseId = "default", cases = {};

  window.onload = () => {
    initData();
    fetch(GAS_URL).then(res => res.json()).then(d => { cards = d; draw(); });
  };

  function initData() {
    const saved = localStorage.getItem('ar_pos_storage');
    if (saved) {
      cases = JSON.parse(saved);
      activeCaseId = localStorage.getItem('ar_pos_active_id') || Object.keys(cases)[0];
    } else {
      cases = { "default": { name: "新規", tel: "", data: {} } };
      activeCaseId = "default";
    }
    loadCase(activeCaseId);
  }

  function loadCase(id) {
    if(!cases[id]) id = Object.keys(cases)[0];
    activeCaseId = id;
    inputs = cases[id].data || {};
    document.getElementById('cust-name').value = cases[id].name === "新規" ? "" : cases[id].name;
    document.getElementById('cust-tel').value = cases[id].tel || "";
    calc(); draw(); updateCaseListUI();
  }

  function saveCurrentCase() {
    cases[activeCaseId].name = document.getElementById('cust-name').value || "新規";
    cases[activeCaseId].tel = document.getElementById('cust-tel').value;
    cases[activeCaseId].data = inputs;
    localStorage.setItem('ar_pos_storage', JSON.stringify(cases));
    localStorage.setItem('ar_pos_active_id', activeCaseId);
  }

  async function callWaitingList() {
    const res = await fetch(GAS_URL + "?action=getWaiting");
    const list = await res.json();
    if(list.length === 0) return alert("待機中のお客様はいません");

    let html = '<div class="list-group">';
    list.forEach((c, i) => {
      html += `<button class="list-group-item list-group-item-action" onclick="applyCustomer(${i})">
        <b>${c.name} 様</b> (${c.tel})<br><small>${c.addressText || '住所なし'}</small>
      </button>`;
    });
    html += '</div>';

    const div = document.createElement('div');
    div.id = "waiting-modal";
    div.innerHTML = `<h5>受付待機リスト</h5>${html}<br><button class="btn btn-secondary w-100" onclick="this.parentElement.remove()">閉じる</button>`;
    document.body.appendChild(div);

    window.applyCustomer = (idx) => {
      const c = list[idx];
      document.getElementById('cust-name').value = c.name;
      document.getElementById('cust-tel').value = c.tel;
      inputs._detail = c; 
      saveCurrentCase();
      div.remove();
      draw();
    };
  }

  function changeQty(name, type, price, delta) {
    const key = name + '-' + type;
    let q = (inputs[key]?.q || 0) + delta;
    if (q <= 0) delete inputs[key]; else inputs[key] = { n: name, t: type, p: price, q: q };
    saveCurrentCase(); calc(); draw();
  }

  function calc() {
    let tq = 0, ta = 0; Object.values(inputs).forEach(i => { if(i.q){ tq += i.q; ta += (i.q * i.p); } });
    document.getElementById('t-qty').innerText = tq;
    document.getElementById('t-amt').innerText = ta.toLocaleString();
  }

  function draw() {
    const container = document.getElementById('display-container');
    const sw = document.getElementById('search').value.toLowerCase();
    const filtered = cards.filter(c => c.isFixed || c.name.toLowerCase().includes(sw));
    
    let html = `<div class="main-table-container"><table class="main-table"><thead><tr><th style="width:40%">カード</th><th>ランク/数量</th></tr></thead><tbody>`;
    html += filtered.map(c => {
      const rowHasValue = ['S','A','B','C','D'].some(t => inputs[c.name+'-'+t]?.q > 0);
      const ctrls = ['S','A','B','C','D'].map(t => {
        const q = inputs[c.name+'-'+t]?.q || 0;
        return `<div class="d-flex align-items-center mb-1"><span style="width:50px;font-size:0.7rem;">${t}:¥${c['price'+t]}</span><div class="qty-ctrl ${q>0?'has-value':''}"><button class="qty-btn" onclick="changeQty('${c.name}','${t}',${c['price'+t]},-1)">-</button><div class="qty-num d-flex align-items-center justify-content-center text-dark">${q}</div><button class="qty-btn" onclick="changeQty('${c.name}','${t}',${c['price'+t]},1)">+</button></div></div>`;
      }).join('');
      return `<tr style="${rowHasValue?'background:#fffde7':''}"><td><div class="small fw-bold">${c.name}</div><img src="${c.image}" style="height:60px"></td><td>${ctrls}</td></tr>`;
    }).join('');
    container.innerHTML = html + `</tbody></table></div>`;
  }

  function finalizeTrade() {
    if(!confirm("確定しますか？")) return;
    const btn = document.getElementById('confirm-btn');
    btn.disabled = true; btn.innerText = "送信中...";
    const data = {
      customerName: document.getElementById('cust-name').value,
      tel: document.getElementById('cust-tel').value,
      customerDetail: inputs._detail || null,
      totalQty: document.getElementById('t-qty').innerText,
      totalAmount: document.getElementById('t-amt').innerText.replace(/,/g, ''),
      items: Object.values(inputs).filter(i => i.q > 0)
    };
    fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) })
      .then(res => res.json()).then(res => {
        if(res.result === "SUCCESS") { alert("保存完了"); delete cases[activeCaseId]; initData(); hideReceipt(); }
      }).catch(e => alert("失敗")).finally(() => { btn.disabled = false; btn.innerText="確定"; });
  }

  function showReceipt() { document.getElementById('main-ui').style.display='none'; document.getElementById('receipt').style.display='block'; refreshReceipt(); }
  function hideReceipt() { document.getElementById('receipt').style.display='none'; document.getElementById('main-ui').style.display='block'; }
  function refreshReceipt() {
    const b = document.getElementById('r-body'); b.innerHTML = "";
    Object.values(inputs).filter(i=>i.q>0).forEach(i => {
      b.innerHTML += `<tr><td>${i.n}</td><td>${i.t}</td><td>${i.p}</td><td class="text-center">${i.q}</td><td>${i.p*i.q}</td></tr>`;
    });
    document.getElementById('r-total-amt').innerText = "¥" + document.getElementById('t-amt').innerText;
    document.getElementById('receipt-meta').innerText = document.getElementById('cust-name').value + " 様";
  }
  function updateCaseListUI() {
    const area = document.getElementById('case-list-area'); area.innerHTML = "";
    Object.keys(cases).forEach(id => {
      const b = document.createElement('button');
      b.className = `case-badge ${id === activeCaseId ? 'active' : 'bg-white border'}`;
      b.innerHTML = `${cases[id].name} <span onclick="deleteCase(event,'${id}')">✕</span>`;
      b.onclick = () => loadCase(id);
      area.appendChild(b);
    });
  }
  function createNewCase() { const id = "c_"+Date.now(); cases[id] = {name:"新規",tel:"",data:{}}; loadCase(id); }
  function deleteCase(e, id) { e.stopPropagation(); if(Object.keys(cases).length<=1) return; delete cases[id]; if(activeCaseId===id) activeCaseId=Object.keys(cases)[0]; saveCurrentCase(); updateCaseListUI(); loadCase(activeCaseId); }
  function autoUpdateCaseName() { saveCurrentCase(); updateCaseListUI(); }
  function resetAll() { if(confirm('消去しますか？')) { inputs={}; saveCurrentCase(); draw(); calc(); } }
</script>
</body>
</html>

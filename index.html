<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RAIRAI POS v14</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    :root { --main: #0d124a; --bg: #f1f5f9; --accent: #facc15; --danger: #ef4444; }
    body { background: var(--bg); color: #1e293b; padding-bottom: 120px; font-family: sans-serif; }

    /* --- 操作画面のデザイン --- */
    .sticky-top { background: #fff; border-bottom: 2px solid var(--main); padding: 10px 15px !important; z-index: 1020; }
    .case-badge { display: inline-flex; align-items: center; gap: 8px; border: 1px solid #cbd5e1; padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; background: white; cursor: pointer; min-width: 80px; margin-right: 5px; }
    .case-badge.active { background: var(--main); color: white; border-color: var(--main); }
    .case-badge .del-btn { color: #94a3b8; font-size: 1rem; padding-left: 5px; cursor: pointer; }
    .case-badge.active .del-btn { color: #fff; opacity: 0.7; }

    .search-area { background: #fff; padding: 10px 15px; border-bottom: 1px solid #e2e8f0; }
    .filter-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-top: 8px; }
    .filter-btn { padding: 6px 0; font-size: 0.75rem; font-weight: bold; border-radius: 4px; border: 1px solid #ddd; background: #fff; text-align: center; }
    .filter-btn.active { background: #64748b; color: white; }

    /* タイル（グリッド）★崩れを徹底排除 */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 15px; padding: 15px; }
    .grid-item { background: white; border-radius: 12px; padding: 12px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; min-height: 400px; }
    .grid-item.has-value { border: 2px solid var(--main); background: #fffbeb; }
    .grid-img { width: 100%; height: 130px; object-fit: contain; margin-bottom: 10px; background: #f8fafc; }
    .grid-card-name { font-size: 0.75rem; font-weight: bold; height: 3em; overflow: hidden; margin-bottom: 10px; }

    /* タイル内の入力テーブル */
    .grid-ctrl-table { width: 100%; font-size: 0.75rem; }
    .grid-ctrl-table td { padding: 3px 0; vertical-align: middle; }
    .price-tag { color: var(--danger); font-weight: bold; }

    /* 数量ボタン共通（明細でも使用） */
    .qty-ctrl { display: inline-flex; align-items: center; border-radius: 4px; border: 1px solid #cbd5e1; overflow: hidden; background: #fff; vertical-align: middle; }
    .qty-ctrl.has-value { background: var(--main); color: white; border-color: var(--main); }
    .qty-btn { border: none; background: transparent; color: inherit; width: 28px; height: 28px; font-weight: bold; }
    .qty-num { width: 34px; border: none; text-align: center; background: transparent; font-weight: bold; font-size: 0.85rem; color: inherit; }

    /* --- 明細・印刷画面のデザイン（徹底強化） --- */
    #receipt { background: #fff; color: #000; padding: 0; }
    .receipt-container { max-width: 800px; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
    .table-receipt { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
    .table-receipt th, .table-receipt td { border: 1px solid #000; padding: 8px; font-size: 13px; word-wrap: break-word; }
    .table-receipt th { background-color: #f2f2f2; text-align: center; }
    
    .receipt-header-title { font-size: 24px; font-weight: bold; text-align: center; margin-bottom: 20px; border-bottom: 3px double #000; padding-bottom: 10px; }
    .receipt-meta-box { margin-bottom: 15px; font-weight: bold; font-size: 16px; }

    /* 合計金額をデカデカと */
    .receipt-total-box { border: 4px double #000; padding: 10px 20px; margin-top: 20px; text-align: right; }
    .total-label { font-size: 16px; }
    .total-amount { font-size: 32px; font-weight: bold; }

    /* ----------------------------------------------------
       印刷設定（ボタンを消し、表を最大化する）
    ---------------------------------------------------- */
    @media print {
      @page { size: A4; margin: 10mm; }
      body { background: #fff !important; padding: 0 !important; }
      .no-print { display: none !important; } /* 操作用UIはすべて隠す */
      #main-ui, .footer-bar { display: none !important; }
      #receipt { display: block !important; }
      .receipt-container { border: none; margin: 0; padding: 0; width: 100%; max-width: 100%; }
      .qty-ctrl { display: none !important; } /* 印刷時に＋ーボタンは出さない */
      .qty-only-text { display: inline !important; font-weight: bold; } /* 数量の数字だけ出す */
      .table-receipt { border: 2px solid #000; }
    }
    
    /* 画面表示時のみ数量のテキストを隠す */
    .qty-only-text { display: none; }
  </style>
</head>
<body>

<div id="main-ui" class="no-print">
  <div class="sticky-top shadow-sm">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div class="fw-bold" style="color:var(--main);">RAIRAI POS SYSTEM</div>
      <div class="btn-group">
        <button id="btn-table" class="btn btn-sm btn-outline-dark active" onclick="switchView('table')">リスト</button>
        <button id="btn-grid" class="btn btn-sm btn-outline-dark" onclick="switchView('grid')">タイル</button>
      </div>
    </div>
    <div class="d-flex align-items-center gap-2 overflow-auto pb-1" id="badge-area">
      <button class="btn btn-primary btn-sm fw-bold px-3" onclick="createNewCase()">新規</button>
      <div id="waiting-area" class="d-flex gap-1"></div>
      <div id="case-list-area" class="d-flex gap-1 border-start ps-2"></div>
    </div>
  </div>

  <div class="search-area shadow-sm">
    <div id="cancel-banner" style="display:none; background:var(--danger); color:white; padding:10px; text-align:center; font-weight:bold; margin-bottom:10px; border-radius:6px;">【⚠️ 満額以外返送希望案件 ⚠️】</div>
    <div class="row g-2 mb-1">
      <div class="col-4"><input type="text" id="cust-name" class="form-control form-control-sm fw-bold" placeholder="顧客名" oninput="autoUpdateCaseName()"></div>
      <div class="col-5"><input type="text" id="search" class="form-control form-control-sm" placeholder="カード名検索..." oninput="draw()"></div>
      <div class="col-3"><button class="btn btn-dark btn-sm w-100 fw-bold" onclick="showReceipt()">明細確認</button></div>
    </div>
    <div id="filter-btns" class="filter-grid"></div>
  </div>
  <div id="display-container"></div>
</div>

<div id="receipt" style="display:none;">
  <div class="receipt-container">
    <div class="receipt-header-title">買取査定明細書</div>
    <div id="receipt-meta" class="receipt-meta-box"></div>
    
    <table class="table-receipt">
      <thead>
        <tr>
          <th style="width: 45%;">商品名 / ランク</th>
          <th style="width: 20%;">単価</th>
          <th style="width: 15%;">数量</th>
          <th style="width: 20%;">合計</th>
        </tr>
      </thead>
      <tbody id="r-body"></tbody>
    </table>

    <div class="receipt-total-box">
      <span class="total-label">合計査定金額(税込)</span><br>
      <span class="total-amount">¥ <span id="r-total-amt">0</span></span>
    </div>

    <div class="mt-5 d-flex flex-column gap-3 no-print">
      <button class="btn btn-success btn-lg fw-bold shadow" onclick="window.print()"><i class="bi bi-printer"></i> 印刷・PDF保存</button>
      <button class="btn btn-primary btn-lg fw-bold shadow" id="btn-finalize" onclick="finalizeTrade()"><i class="bi bi-cloud-upload"></i> 買取を確定して保存</button>
      <button class="btn btn-outline-secondary py-3" onclick="hideReceipt()">編集に戻る</button>
    </div>
  </div>
</div>

<div class="footer-bar no-print">
  <div class="h3 m-0 fw-bold">¥<span id="t-amt">0</span> <small class="fs-6 ms-2"><span id="t-qty">0</span>枚</small></div>
  <button class="btn btn-outline-warning btn-sm px-4 rounded-pill" onclick="resetAll()">全初期化</button>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwi7tWn74PWL-HD59oj7p1DZDdfddMn4wdJRJCCZJKznuBSLZ6GA88W6Lp-g1RrFkkSOw/exec";
  let cards = [], inputs = {}, activeCaseId = "default", cases = {}, currentFilter = "", currentView = "table", waitingList = [];

  const filterMap = {"あ":"^[あいうえおアイウエオｱｲｳｴｵ]","か":"^[かきくけこがぎぐげごカキクケコガギグゲゴｶｷｸｹｺｶﾞｷﾞｸﾞｹﾞｺﾞ]","さ":"^[さしすせそざじずぜぞサシスセソザジズゼゾｻｼｽｾｿｻﾞｼﾞｽﾞｾﾞｿﾞ]","た":"^[たちつてとだぢづでどタチツテトダヂヂヅデドﾀﾁﾂﾃﾄﾀﾞﾁﾞﾂﾞﾃﾞﾄﾞ]","な":"^[なにぬねのナニヌネノﾅﾆﾇﾈﾉ]","は":"^[はひふへほばびぶべぼぱぴぷぺぽハヒフヘホバビブベボパピプペポﾊﾋﾌﾍﾎﾊﾞﾋﾞﾌﾞﾍﾞﾎﾞﾊﾟﾋﾟﾌﾟﾍﾟﾎﾟ]","ま":"^[まみむめもマミムメモﾏﾐﾑメモ]","や":"^[やゆよヤユヨﾔﾕﾖ]","ら":"^[らりるれろラリルレロﾗﾘﾙﾚﾛ]","わ":"^[わをんワヲンﾜｦﾝ]"};

  window.onload = async () => {
    const fb = document.getElementById('filter-btns');
    Object.keys(filterMap).forEach(l => {
      const b = document.createElement('button'); b.className = "filter-btn"; b.innerText = l;
      b.onclick = function() { document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active')); this.classList.add('active'); currentFilter = filterMap[l]; draw(); };
      fb.appendChild(b);
    });
    const saved = localStorage.getItem('arpos_v14');
    if (saved) { cases = JSON.parse(saved); activeCaseId = localStorage.getItem('active_id_v14') || Object.keys(cases)[0]; }
    else { createNewCase(); }
    try { const res = await fetch(GAS_URL); cards = await res.json(); draw(); loadCase(activeCaseId); } catch(e){}
    setInterval(refreshWaiting, 15000); refreshWaiting();
  };

  function switchView(v) { currentView = v; document.getElementById('btn-table').classList.toggle('active', v==='table'); document.getElementById('btn-grid').classList.toggle('active', v==='grid'); draw(); }

  function draw() {
    const container = document.getElementById('display-container');
    const sw = document.getElementById('search').value.toLowerCase();
    const filtered = cards.filter(c => c.isFixed || (c.name.toLowerCase().includes(sw) && (currentFilter === "" || new RegExp(currentFilter).test(c.name))));
    
    if (currentView === 'table') {
      let html = `<div class="main-table-container"><table class="main-table"><thead><tr><th style="width:35%">商品名</th><th>S</th><th>A</th><th>B</th><th>C</th><th>D</th></tr></thead><tbody>`;
      html += filtered.map(c => {
        const ctrls = ['S','A','B','C','D'].map(t => {
          const q = inputs[c.name+'-'+t]?.q || 0; const p = c['price'+t] || 0;
          return `<td><div class="qty-ctrl ${q>0?'has-value':''}"><button class="qty-btn" onclick="changeQty('${c.name}','${t}',${p},-1)">-</button><input type="number" class="qty-num" value="${q}" readonly><button class="qty-btn" onclick="changeQty('${c.name}','${t}',${p},1)">+</button></div><div class="text-center text-danger small">¥${p}</div></td>`;
        }).join('');
        return `<tr class="${['S','A','B','C','D'].some(t=>inputs[c.name+'-'+t]?.q>0)?'has-value-row':''}"><td><div class="d-flex align-items-center gap-2"><img src="${c.image}" style="width:35px;height:49px;object-fit:contain"><span class="small fw-bold">${c.name}</span></div></td>${ctrls}</tr>`;
      }).join('');
      container.innerHTML = html + `</tbody></table></div>`;
    } else {
      let html = `<div class="card-grid">`;
      html += filtered.map(c => {
        const rows = ['S','A','B','C','D'].map(t => {
          const q = inputs[c.name+'-'+t]?.q || 0; const p = c['price'+t] || 0;
          return `<tr><td style="width:20px; font-weight:900">${t}</td><td class="price-tag">¥${p}</td><td class="text-end"><div class="qty-ctrl ${q>0?'has-value':''}"><button class="qty-btn" onclick="changeQty('${c.name}','${t}',${p},-1)">-</button><input type="number" class="qty-num" value="${q}" readonly><button class="qty-btn" onclick="changeQty('${c.name}','${t}',${p},1)">+</button></div></td></tr>`;
        }).join('');
        return `<div class="grid-item ${['S','A','B','C','D'].some(t=>inputs[c.name+'-'+t]?.q>0)?'has-value':''}"><img src="${c.image}" class="grid-img"><div class="grid-card-name">${c.name}</div><table class="grid-ctrl-table">${rows}</table></div>`;
      }).join('');
      container.innerHTML = html + `</div>`;
    }
  }

  function changeQty(name, type, price, delta) {
    const key = name + '-' + type;
    let q = (inputs[key]?.q || 0) + delta;
    if (q <= 0) delete inputs[key]; else inputs[key] = { n: name, t: type, p: price, q: q };
    saveCurrentCase(); calc();
    if (document.getElementById('receipt').style.display === 'block') showReceipt(); else draw();
  }

  function calc() {
    let tq = 0, ta = 0; Object.values(inputs).forEach(i => { tq += i.q; ta += (i.q * i.p); });
    document.getElementById('t-qty').innerText = tq; document.getElementById('t-amt').innerText = ta.toLocaleString();
    if(document.getElementById('r-total-amt')) document.getElementById('r-total-amt').innerText = ta.toLocaleString();
  }

  function showReceipt() {
    document.getElementById('main-ui').style.display='none'; 
    document.getElementById('receipt').style.display='block';
    const b = document.getElementById('r-body'); b.innerHTML = "";
    Object.keys(inputs).forEach(key => {
      const i = inputs[key];
      b.innerHTML += `<tr>
        <td><div class="fw-bold">${i.n}</div><div class="small text-muted">${i.t}ランク</div></td>
        <td class="text-center">¥${i.p.toLocaleString()}</td>
        <td class="text-center">
          <div class="qty-ctrl has-value no-print">
            <button class="qty-btn" onclick="changeQty('${i.n}','${i.t}',${i.p},-1)">-</button>
            <input type="number" class="qty-num" value="${i.q}" readonly>
            <button class="qty-btn" onclick="changeQty('${i.n}','${i.t}',${i.p},1)">+</button>
          </div>
          <span class="qty-only-text">${i.q}</span>
        </td>
        <td class="text-end fw-bold">¥${(i.q*i.p).toLocaleString()}</td>
      </tr>`;
    });
    calc();
    const cancelTxt = cases[activeCaseId].cancelIfSubMax === "希望する" ? `<span style="color:red; margin-left:15px;">【！！満額査定以外返送希望！！】</span>` : "";
    document.getElementById('receipt-meta').innerHTML = `氏名: ${document.getElementById('cust-name').value || "未指定"} 様 ${cancelTxt}`;
  }

  function hideReceipt() { document.getElementById('receipt').style.display='none'; document.getElementById('main-ui').style.display='block'; draw(); }
  function saveCurrentCase() { if(!cases[activeCaseId]) return; cases[activeCaseId].name = document.getElementById('cust-name').value || "新規"; cases[activeCaseId].data = inputs; localStorage.setItem('arpos_v14', JSON.stringify(cases)); localStorage.setItem('active_id_v14', activeCaseId); }
  function loadCase(id) { if(!cases[id]) return; activeCaseId = id; inputs = cases[id].data || {}; document.getElementById('cust-name').value = cases[id].name === "新規" ? "" : cases[id].name; document.getElementById('cancel-banner').style.display = (cases[id].cancelIfSubMax === "希望する") ? "block" : "none"; calc(); draw(); updateCaseListUI(); }
  function createNewCase() { const id = "c_" + Date.now(); cases[id] = { name: "新規", data: {}, cancelIfSubMax: "希望しない" }; saveCurrentCase(); loadCase(id); }
  function autoUpdateCaseName() { saveCurrentCase(); updateCaseListUI(); }
  function updateCaseListUI() { const area = document.getElementById('case-list-area'); area.innerHTML = ""; Object.keys(cases).forEach(id => { const b = document.createElement('div'); b.className = `case-badge ${id === activeCaseId ? 'active' : ''}`; b.innerHTML = `<span>${cases[id].name}</span><i class="bi bi-x-circle-fill del-btn" onclick="deleteCase(event, '${id}')"></i>`; b.onclick = () => loadCase(id); area.appendChild(b); }); }
  function deleteCase(e, id) { e.stopPropagation(); if (Object.keys(cases).length <= 1) { inputs = {}; document.getElementById('cust-name').value = ""; saveCurrentCase(); draw(); return; } delete cases[id]; if (activeCaseId === id) activeCaseId = Object.keys(cases)[0]; saveCurrentCase(); loadCase(activeCaseId); }
  async function finalizeTrade() { if(!confirm("保存して完了しますか？")) return; const btn = document.getElementById('btn-finalize'); btn.disabled = true; const tradeData = { action: "log_trade", customerName: document.getElementById('cust-name').value, tel: cases[activeCaseId].tel || "", totalQty: document.getElementById('t-qty').innerText, totalAmount: document.getElementById('t-amt').innerText.replace(/,/g, ''), items: Object.values(inputs).filter(i => i.q > 0) }; try { const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(tradeData) }); const json = await res.json(); if(json.result === "SUCCESS") { alert("完了"); delete cases[activeCaseId]; if(Object.keys(cases).length===0) createNewCase(); else { activeCaseId=Object.keys(cases)[0]; loadCase(activeCaseId); } hideReceipt(); } } catch(e) { alert("保存失敗"); } finally { btn.disabled = false; } }
  async function refreshWaiting() { try { const res = await fetch(GAS_URL + "?action=getWaiting"); const list = await res.json(); document.getElementById('waiting-area').innerHTML = list.map((c, i) => `<button class="case-badge waiting-badge" onclick="importWaiting(${i})"><i class="bi bi-person-fill"></i> ${c.name.substr(0,4)}</button>`).join(''); } catch(e){} }
  async function importWaiting(idx) { const c = waitingList[idx]; if(!confirm(c.name + "様を読み込む？")) return; const id = "c_" + Date.now(); cases[id] = { name: c.name, tel: c.tel, cancelIfSubMax: c.cancelStatus, data: {} }; saveCurrentCase(); loadCase(id); }
  function resetAll() { if(confirm('全て消去？')) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
